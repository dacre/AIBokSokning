# Biblioteksspanaren – schemalagd sökning mot Stockholms stadsbibliotek
#
# SETUP (gör en gång):
#   1. Gå till repo → Settings → Actions → General
#   2. Under "Workflow permissions": välj "Read and write permissions"
#   3. Klicka Save
#
# Kör därefter manuellt via: Actions → Biblioteksspanaren → Run workflow
# Schemalagd körning sker första fredagen i månaden kl 14:00 svensk tid.
#
# Data (cursor.json, bibliotek.json, scripts/) lever på grenen claude/boktips.

name: Biblioteksspanaren

on:
  schedule:
    # Varje fredag 12:00 UTC = 14:00 CEST / 13:00 CET.
    # Steget "Kontrollera första fredagen" hoppar över övriga fredagar.
    - cron: '0 12 * * 5'
  workflow_dispatch:        # Tillåt manuell körning från GitHub UI

permissions:
  contents: write           # Krävs för att committa och pusha tillbaka

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      kör: ${{ steps.check.outputs.kör }}
    steps:
      - name: Kontrollera första fredagen i månaden
        id: check
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "kör=true" >> $GITHUB_OUTPUT
          elif [ "$(date -u +%d)" -le 7 ]; then
            echo "Dag $(date -u +%d) – första fredagen. Kör."
            echo "kör=true" >> $GITHUB_OUTPUT
          else
            echo "Dag $(date -u +%d) – inte första fredagen. Hoppar över."
            echo "kör=false" >> $GITHUB_OUTPUT
          fi

  spana:
    needs: check
    if: needs.check.outputs.kör == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checka ut grenen
        uses: actions/checkout@v4
        with:
          ref: claude/boktips

      - name: Sätt upp Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Konfigurera git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Kör biblioteksspanaren
        run: python3 scripts/run_spanaren.py

      - name: Committa och pusha resultat
        run: |
          git add bibliotek.json cursor.json
          if git diff --staged --quiet; then
            echo "Inga ändringar – ingenting att committa."
          else
            git commit -m "biblioteksspanaren: $(date -u +%Y-%m-%d)"
            git push origin claude/boktips
          fi
